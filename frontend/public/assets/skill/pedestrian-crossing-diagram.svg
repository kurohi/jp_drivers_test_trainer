<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#f8f9fa"/>
  <!-- Road -->
  <rect x="30" y="270" width="440" height="60" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Crosswalk stripes -->
  <rect x="200" y="270" width="15" height="60" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <rect x="225" y="270" width="15" height="60" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <rect x="250" y="270" width="15" height="60" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <rect x="275" y="270" width="15" height="60" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <rect x="300" y="270" width="15" height="60" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <!-- Stop line -->
  <line x1="180" y1="270" x2="180" y2="330" stroke="#fff" stroke-width="4"/>
  <!-- Correct trajectory -->
  <path d="M50 300 L80 300 L110 300 L140 300 L160 300 L175 300 L180 300 L180 300 L200 300 L230 300 L260 300 L290 300 L320 300 L350 300 L400 300" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Deceleration zone -->
  <rect x="100" y="265" width="80" height="70" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="110" y="260" font-size="9" fill="#f59e0b" font-family="sans-serif">Decelerate</text>
  <!-- Head check indicators -->
  <text x="170" y="260" font-size="9" fill="#3b82f6" font-family="sans-serif">左確認</text>
  <text x="210" y="260" font-size="9" fill="#3b82f6" font-family="sans-serif">右確認</text>
  <!-- Wrong trajectory (no stop) -->
  <path d="M50 300 L100 300 L150 300 L180 300 L200 300 L230 300 L260 300 L300 300 L350 300 L400 300" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Pedestrian figure -->
  <circle cx="250" cy="255" r="6" fill="#666"/>
  <line x1="250" y1="261" x2="250" y2="275" stroke="#666" stroke-width="2"/>
  <line x1="250" y1="268" x2="242" y2="272" stroke="#666" stroke-width="1.5"/>
  <line x1="250" y1="268" x2="258" y2="272" stroke="#666" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="40" y="350" font-size="10" fill="#333" font-family="sans-serif">Approach</text>
  <text x="380" y="350" font-size="10" fill="#333" font-family="sans-serif">Clear</text>
</svg>
