<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#f8f9fa"/>
  <!-- L-shaped corridor -->
  <rect x="30" y="250" width="140" height="220" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="30" y="130" width="440" height="140" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Inner corner (hazard zone) -->
  <rect x="150" y="250" width="20" height="20" fill="#e74c3c" opacity="0.3"/>
  <!-- Correct trajectory -->
  <path d="M100 450 L100 350 L100 280 Q100 250 130 220 Q160 190 200 170 Q250 155 300 150 L450 150" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Wrong trajectory -->
  <path d="M100 450 L100 350 L100 300 Q100 270 120 250 Q140 230 160 220 Q180 210 200 200 Q250 180 300 165 L450 150" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- 90-degree angle marker -->
  <path d="M150 250 L150 270 L170 270" fill="none" stroke="#666" stroke-width="1"/>
  <text x="155" y="265" font-size="9" fill="#666" font-family="sans-serif">90°</text>
  <!-- Rear check indicator -->
  <circle cx="100" cy="280" r="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="295" font-size="9" fill="#3b82f6" font-family="sans-serif">後方確認</text>
  <!-- Labels -->
  <text x="85" y="470" font-size="10" fill="#333" font-family="sans-serif">Approach</text>
  <text x="440" y="145" font-size="10" fill="#333" font-family="sans-serif">Exit</text>
  <text x="160" y="245" font-size="9" fill="#e74c3c" font-family="sans-serif">内輪差 hazard</text>
</svg>
