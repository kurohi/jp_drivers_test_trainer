<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#f8f9fa"/>
  <!-- Road -->
  <rect x="30" y="270" width="440" height="60" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Center line -->
  <line x1="30" y1="300" x2="470" y2="300" stroke="#f59e0b" stroke-width="2" stroke-dasharray="20,10"/>
  <!-- Signal point -->
  <circle cx="150" cy="300" r="12" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="2"/>
  <text x="135" y="275" font-size="9" fill="#f59e0b" font-family="sans-serif">Signal!</text>
  <!-- Correct trajectory (straight line, stopping) -->
  <path d="M50 300 L80 300 L110 300 L140 300 L150 300 L160 300 L180 300 L200 300 L220 300 L240 300 L260 300 L280 300 L300 300 L320 300" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Stop marker -->
  <rect x="310" y="265" width="20" height="70" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="300" y="260" font-size="9" fill="#22c55e" font-family="sans-serif">STOP</text>
  <!-- Wrong trajectory (skid) -->
  <path d="M50 300 L80 300 L110 300 L140 300 L150 300 L170 300 L190 300 L210 300 L230 300 L250 300 L270 300 L290 300 L310 300 L330 300" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Skid marks -->
  <line x1="250" y1="290" x2="310" y2="290" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="310" x2="310" y2="310" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <text x="260" y="285" font-size="9" fill="#ef4444" font-family="sans-serif">Skid</text>
  <!-- Mirror check indicator -->
  <text x="155" y="285" font-size="9" fill="#3b82f6" font-family="sans-serif">後方確認</text>
  <!-- Labels -->
  <text x="40" y="350" font-size="10" fill="#333" font-family="sans-serif">Cruising</text>
  <text x="340" y="350" font-size="10" fill="#333" font-family="sans-serif">Stopped</text>
</svg>
