<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#f8f9fa"/>
  <!-- Hill slope -->
  <polygon points="50,400 450,150 450,400" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <!-- Road surface on hill -->
  <line x1="50" y1="400" x2="450" y2="150" stroke="#555" stroke-width="4"/>
  <!-- Stop position marker -->
  <rect x="140" y="330" width="40" height="20" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1" rx="3"/>
  <text x="130" y="325" font-size="9" fill="#3b82f6" font-family="sans-serif">Stop here</text>
  <!-- Correct trajectory -->
  <path d="M80 380 L120 355 L150 340 L150 330 L150 310 L170 290 L200 265 L240 240 L280 220 L320 200 L370 180 L420 165" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Wrong trajectory (rollback) -->
  <path d="M80 380 L120 355 L150 340 L150 350 L140 365 L130 375 L140 360 L155 340 L170 320 L200 290 L240 260" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Rollback arrow -->
  <path d="M150 340 L135 360" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="135,355 130,365 140,365" fill="#ef4444"/>
  <text x="100" y="370" font-size="9" fill="#ef4444" font-family="sans-serif">Rollback!</text>
  <!-- Handbrake indicator -->
  <text x="155" y="320" font-size="9" fill="#f59e0b" font-family="sans-serif">Pブレーキ</text>
  <!-- Grade indicator -->
  <text x="300" y="300" font-size="10" fill="#666" font-family="sans-serif">12-16% grade</text>
  <!-- Labels -->
  <text x="40" y="420" font-size="10" fill="#333" font-family="sans-serif">Bottom</text>
  <text x="430" y="145" font-size="10" fill="#333" font-family="sans-serif">Top</text>
</svg>
